apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: conversation-openai
spec:
  type: conversation.openai
  metadata:
    - name: key
      secretKeyRef:
        name: OPENAI_API_KEY
        key: OPENAI_API_KEY
    - name: model
      value: gpt-4o-mini
    - name: cacheTTL
      value: 5m
auth:
  secretStore: envvar-secret-store